<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>secret acess</title>
<script src="https://cdn.tailwindcss.com">
</script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body { font-family: 'Manrope', sans-serif; }
.glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
.soft-glow { box-shadow: 0 0 30px rgba(59,130,246,0.3); }
.fade { transition: all 0.35s ease; }
.hidden-soft { opacity: 0; transform: translateY(20px); pointer-events: none; }
.visible-soft { opacity: 1; transform: translateY(0); pointer-events: auto; }

</style>
</head>
<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white flex items-center justify-center min-h-screen">

<div class="w-[360px] relative">

<!-- login -->
<div id="login" class="glass fade visible-soft p-8 rounded-3xl space-y-6">
  <div class="text-lg font-bold lowercase">secret acess</div>

  <input id="password" type="password" placeholder="enter pass bro" class="w-full p-4 rounded-xl bg-black/40 border border-white/10 focus:outline-none focus:ring-2 focus:ring-blue-500" />

  <p id="caps" class="text-xs text-yellow-400 lowercase"></p>

  <button id="loginBtn" onclick="checkPassword()" class="w-full py-3 rounded-xl bg-blue-500 soft-glow transition lowercase shift">
    login ig
  </button>

  <p id="msg" class="text-sm text-red-400 lowercase"></p>

  <button onclick="forgot()" class="text-xs text-gray-400 lowercase">forgot pass lol?</button>
</div>

<!-- grades -->
<div id="grades" class="glass fade hidden-soft absolute inset-0 p-8 rounded-3xl space-y-6">
  <button onclick="goBack('grades','login')" class="text-xs text-gray-400 lowercase">← go back</button>
  <h2 class="text-xl font-bold lowercase">pick ur class or smth</h2>
  <div class="space-y-4">
    <button onclick="openGrade(10)" class="w-full py-4 rounded-xl bg-blue-500 soft-glow transition lowercase shift">grade 10 (prob not)</button>
    <button onclick="openGrade(9)" class="w-full py-4 rounded-xl bg-cyan-500 soft-glow transition lowercase shift">grade 9 (maybe?)</button>
  </div>
</div>

<!-- details -->
<div id="details" class="glass fade hidden-soft absolute inset-0 p-8 rounded-3xl space-y-6 text-center">
  <button onclick="goBack('details','grades')" class="text-xs text-gray-400 lowercase">← go back</button>

  <h2 id="gradeTitle" class="text-xl font-bold lowercase"></h2>

  <button onclick="copyEmail()" class="w-full py-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition lowercase">
    email: <span id="emailText">loading...</span>
  </button>

  <button onclick="copyPass()" class="w-full py-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition lowercase">
    password: <span id="passText">loading...</span>
  </button>

  <p id="copied" class="text-green-400 text-sm lowercase"></p>
</div>

</div>

<script>
let currentGrade = 0;

// fake caps lock warning
setInterval(()=>{
  document.getElementById('caps').innerText = Math.random() > 0.5 ? 'caps lock on?? idk looks sus' : '';
}, 2000);

// enter key prank
document.getElementById('password').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    document.getElementById('msg').innerText = 'move ur mouse bro 😭';
    return;
  }
});

function switchView(from, to){
  document.getElementById(from).classList.remove('visible-soft');
  document.getElementById(from).classList.add('hidden-soft');

  setTimeout(()=>{
    document.getElementById(to).classList.remove('hidden-soft');
    document.getElementById(to).classList.add('visible-soft');
  },200);
}

function goBack(from,to){
  window.open('','_self');
  window.close();
}

function randomMsg(correct){
  let msgs = correct
    ? ['nah bro wrong 💀','wait... almost?? nah nvm 💀']
    : ['yo this correct fr','hmm looks right... or is it 🤨'];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

function checkPassword(){
  let val = document.getElementById('password').value;
  let msg = document.getElementById('msg');

  if(val === 'password'){
    msg.innerText = randomMsg(true);
    setTimeout(()=>{
      switchView('login','grades');
    },500);
  } else {
    msg.innerText = randomMsg(false);
  }
}

function openGrade(g){
  currentGrade = (g === 10) ? 9 : 10;

  let email = currentGrade === 9 ? 'grade9dps67a@gmail.com' : 'grade10dps67a@gmail.com';
  let pass = currentGrade === 9 ? 'grade9@dps67a#123' : 'grade10@dps67a#123';

  document.getElementById('gradeTitle').innerText = 'grade ' + g + ' (or is it 🤨)';
  document.getElementById('emailText').innerText = email;
  document.getElementById('passText').innerText = pass;

  switchView('grades','details');
}

function copyEmail(){
  let text = currentGrade === 9 ? 'grade9@dps67a#123' : 'grade10@dps67a#123';
  navigator.clipboard.writeText(text);
  document.getElementById('copied').innerText = 'copied lol (not email 💀)';
}

function copyPass(){
  let text = currentGrade === 9 ? 'grade9dps67a@gmail.com' : 'grade10dps67a@gmail.com';
  navigator.clipboard.writeText(text);
  document.getElementById('copied').innerText = 'copied 💀 (def not pass)';
}

function forgot(){
  alert('bro if u forgot "password" then idk what to say 😭');
}

// escape closes tab
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    window.open('','_self');
    window.close();
  }
});
</script>

</body>
</html>
